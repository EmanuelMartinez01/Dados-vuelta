<!DOCTYPE html>
<html class="dark" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800;900&family=Inter:wght@400;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<title>Dados Vuelta</title>

<style>
body { background:#121414; color:#e2e2e2; font-family: Inter; }
</style>
</head>

<body class="overflow-x-hidden">

<!-- HEADER -->
<header class="bg-black border-b-2 border-white flex justify-between items-center px-6 py-4">
<div class="text-2xl font-black italic text-[#C1121F] uppercase">DADOS VUELTA</div>
<button id="navPlay" class="bg-[#C1121F] px-4 py-2 text-white font-bold">EN VIVO</button>
</header>

<!-- HERO -->
<section class="min-h-screen flex flex-col justify-center items-center text-center px-6">

<h1 class="text-6xl font-black mb-4">DADOS VUELTA</h1>
<p class="text-xl mb-6">Cultura, Rock y Voz Propia</p>

<!-- PLAYER -->
<div class="bg-black border-2 border-white p-6 flex gap-6 items-center w-full max-w-xl">

<button id="playBtn" class="w-20 h-20 bg-[#C1121F] flex items-center justify-center">
<span id="playIcon" class="material-symbols-outlined text-4xl text-white">play_arrow</span>
</button>

<div class="flex-1 text-left">

<div class="flex items-center gap-2">
<span id="liveDot" class="w-2 h-2 bg-gray-500"></span>
<span id="liveStatus" class="text-gray-400 uppercase text-xs">Offline</span>
</div>

<h2 class="font-bold">Dados Vuelta - Streaming</h2>

<input id="volumeControl" type="range" min="0" max="1" step="0.01" value="1" class="w-full mt-2">

</div>
</div>

<audio id="radioPlayer" src="https://example-stream-url.com/stream"></audio>

</section>

<!-- CONTACTO -->
<section class="p-6 bg-black">
<h2 class="text-2xl mb-4">Contacto</h2>

<form id="contactForm" class="space-y-4 max-w-md">
<input id="name" type="text" placeholder="Nombre" class="w-full p-2 bg-transparent border-b border-white"/>
<input id="email" type="email" placeholder="Email" class="w-full p-2 bg-transparent border-b border-white"/>
<textarea id="message" placeholder="Mensaje" class="w-full p-2 bg-transparent border-b border-white"></textarea>

<button type="submit" class="bg-white text-black px-4 py-2">Enviar</button>
<p id="formMsg" class="text-green-400 hidden">Mensaje enviado ✔</p>
</form>
</section>

<script>
// PLAYER
const player = document.getElementById("radioPlayer");
const playBtn = document.getElementById("playBtn");
const navPlay = document.getElementById("navPlay");
const icon = document.getElementById("playIcon");
const status = document.getElementById("liveStatus");
const dot = document.getElementById("liveDot");
const volume = document.getElementById("volumeControl");

function togglePlay(){
    if(player.paused){
        player.play();
    } else {
        player.pause();
    }
}

playBtn.onclick = togglePlay;
navPlay.onclick = togglePlay;

player.addEventListener("play", ()=>{
    icon.textContent = "pause";
    status.textContent = "EN VIVO";
    status.classList.remove("text-gray-400");
    status.classList.add("text-[#C1121F]");
    dot.classList.remove("bg-gray-500");
    dot.classList.add("bg-[#C1121F]");
});

player.addEventListener("pause", ()=>{
    icon.textContent = "play_arrow";
    status.textContent = "OFFLINE";
    status.classList.add("text-gray-400");
    status.classList.remove("text-[#C1121F]");
    dot.classList.add("bg-gray-500");
    dot.classList.remove("bg-[#C1121F]");
});

volume.addEventListener("input", e=>{
    player.volume = e.target.value;
});

// FORM
const form = document.getElementById("contactForm");
const msg = document.getElementById("formMsg");

form.addEventListener("submit", (e)=>{
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();

    if(!name || !email || !message){
        alert("Completá todos los campos");
        return;
    }

    if(!email.includes("@")){
        alert("Email inválido");
        return;
    }

    msg.classList.remove("hidden");
    form.reset();
});
</script>

</body>
</html>
